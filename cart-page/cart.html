<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Supply - Cart</title>
    <link rel="stylesheet" href="../styles/style-landing.css">
    <link rel="stylesheet" href="style-cart.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">✨ Beauty Supply</h1>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../shop-page/shop.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <h2>Shopping Cart</h2>
        <div class="cart-container">
            <div class="cart-items" id="cartItems">
                <!-- Items will be loaded here -->
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>$5.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <button class="btn-checkout">Checkout</button>
                <a href="../shop-page/shop.html" class="btn-continue">Continue Shopping</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Beauty Supply. All rights reserved.</p>
    </footer>

    <script src="../products.js"></script>
    <script src="app.js"></script>
</body>
</html>
